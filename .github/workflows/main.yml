      - name: Sync and Build
        shell: bash
        run: |
          # 1. Install Repo tool
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          export PATH=~/bin:$PATH

          # 2. Setup Repo and Sync
          mkdir -p twrp
          cd twrp
          repo init --depth=1 -u https://github.com -b twrp-14.1
          repo sync -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

          # 3. Add your device tree
          mkdir -p device/xiaomi/creek
          cp -r ../* device/xiaomi/creek/ || true

          # 4. Build Environment
          export ALLOW_MISSING_DEPENDENCIES=true
          source build/envsetup.sh
          
          # 5. Lunch and Build
          # Use the trunk_staging release for AOSP 14/15/16 trees
          lunch twrp_creek-trunk_staging-eng
          mka recoveryimage -j4
