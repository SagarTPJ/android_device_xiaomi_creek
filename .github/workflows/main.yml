name: Build TWRP for Redmi 15 4G
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Device Tree
      uses: actions/checkout@v4
      with:
        path: twrp/device/xiaomi/creek

    - name: Nuclear Cleanup (Maximize Disk Space)
      run: |
        sudo docker image prune --all --force
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
        sudo apt-get autoremove -y
        sudo apt-get clean
        echo "Final Disk Space:"
        df -h /

    - name: Install Build Tools
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential zip curl libstdc++6 git python3 python-is-python3

    - name: Install Repo Tool
      run: |
        mkdir -p ~/bin
        curl https://googleapis.com > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Initialize TWRP Source
      run: |
        mkdir -p twrp
        cd twrp
        git config --global user.name "Your Name"
        git config --global user.email "your@email.com"
        # Using python3 to run repo prevents HTML/Bash syntax errors
        python3 /usr/bin/repo init --depth=1 -u https://github.com -b twrp-12.1
        python3 /usr/bin/repo sync -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

    - name: Build TWRP
      run: |
        cd twrp
        export ALLOW_MISSING_DEPENDENCIES=true
        source build/envsetup.sh
        lunch omni_creek-eng
        mka recoveryimage -j$(nproc --all)

    - name: Upload Recovery Image
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-Redmi15-Creek
        path: twrp/out/target/product/creek/*.img
