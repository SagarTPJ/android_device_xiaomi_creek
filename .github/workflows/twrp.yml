name: Recovery Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maximize Build Space (Nuclear Cleanup)
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/powershell /usr/share/swift /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force

      - name: Sync and Build
        shell: bash
        run: |
          sudo apt-get update && sudo apt-get install repo -y
          mkdir -p twrp && cd twrp
          repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

          mkdir -p device/xiaomi/creek
          cp -av $GITHUB_WORKSPACE/[!t]* device/xiaomi/creek/

          # Ensure the makefile uses the correct inheritance
          cat <<EOF > device/xiaomi/creek/twrp_creek.mk
          \$(call inherit-product, \$(SRC_TARGET_DIR)/product/core_64_bit.mk)
          \$(call inherit-product, \$(SRC_TARGET_DIR)/product/full_base_telephony.mk)
          \$(call inherit-product, device/xiaomi/creek/device.mk)
          \$(call inherit-product, vendor/twrp/config/common.mk)
          PRODUCT_DEVICE := creek
          PRODUCT_NAME := twrp_creek
          PRODUCT_BRAND := Xiaomi
          PRODUCT_MODEL := Redmi 15 4G
          PRODUCT_MANUFACTURER := xiaomi
          EOF

          export ALLOW_MISSING_DEPENDENCIES=true
          source build/envsetup.sh
          lunch twrp_creek-eng
          # Target both in case the tree supports either
          mka recoveryimage vendor_bootimage -j$(nproc --all)

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-Creek-Image
          path: twrp/out/target/product/creek/*.img
